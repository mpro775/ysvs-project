services:
  api:
    container_name: ${PROJECT_SLUG}-api
    build:
      context: ./ysvs-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: ${APP_PORT:-3000}
      PORT: ${APP_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api/v1}
      MONGODB_URI: ${MONGODB_URI}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PASS: ${MAIL_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      UPLOAD_PATH: /app/uploads
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    expose:
      - "${APP_PORT:-3000}"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${APP_PORT:-3000}/health/live >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=vx50i5vf3rgexls4p2anjuan
      - traefik.http.services.ysvs-api.loadbalancer.server.port=3000

  frontend:
    container_name: ${PROJECT_SLUG}-frontend
    build:
      context: ./ysvs-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=vx50i5vf3rgexls4p2anjuan
      - traefik.http.services.ysvs-frontend.loadbalancer.server.port=80
  redis:
    container_name: ${PROJECT_SLUG}-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

volumes:
  uploads_data:
  redis_data:

networks:
  app-network:
    name: ${PROJECT_SLUG}-network
    driver: bridge
  platform-network:
    external: true
    name: platform-network
